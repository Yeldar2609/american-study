runConfig:
  cpu: 1
  memoryMiB: 512
  # Keep one warm instance so the first request of a session does not pay a
  # cold container + Next.js boot on top of the cross-region DB latency.
  minInstances: 1
  maxInstances: 10
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_APP_URL
    value: https://american-study--american-study-web-app.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUPABASE_URL
    value: https://jekazsybbcdfwfyvcxnn.supabase.co
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
    value: sb_publishable_GHNrNrZOmMtcSXtpRJfdXQ_69tbuySI
    availability:
      - BUILD
      - RUNTIME
  # Server-only service-role key (bypasses RLS) — RUNTIME only, never BUILD/client.
  # Backed by Cloud Secret Manager secret SUPABASE_SERVICE_ROLE_KEY.
  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: SUPABASE_SERVICE_ROLE_KEY
    availability:
      - RUNTIME
  # Default calendar booking link. Admins can override it in-app (stored in
  # public.app_settings); this value is the fallback when no override is set.
  # Not a secret — it is a public scheduling link users are redirected to.
  - variable: CALENDAR_BOOKING_LINK
    value: https://calendar.app.google/dJVzVdoJhdCzXSt17
    availability:
      - RUNTIME
